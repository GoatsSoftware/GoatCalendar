name: CI - Services Integration Tests

on:
  push:
    branches: [ main, develop, feature/services_deploiement ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write
  attestations: write
  pull-requests: write

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v6.0.0
      with:
          args: >
            -Dsonar.projectVersion=${{ github.sha }}
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: pypi
      url: https://pypi.org/p/${{ matrix.service }}
    permissions:
      id-token: write
      contents: read

    strategy:
      matrix:
        service: [database_service, shared_models, auth_service, board_service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: '3.14'

      - name: Build Package
        run: |
          # Move into the service directory and build the wheel/sdist
          cd back/${{ matrix.service }}
          pdm build

      - name: Publish to PyPI
        run: |
          cd back/${{ matrix.service }}
          # --no-comment instructs PDM to skip prompting for credentials,
          # forcing it to use the OIDC token provided by GitHub Actions
          pdm publish --no-comment

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - service: "database_service"
            dockerfile: "Dockerfile.DatabaseService"
          - service: "auth_service"
            dockerfile: "Dockerfile.AuthService"
          - service: "board_service"
            dockerfile: "Dockerfile.BoardService"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: '3.14'

      - name: Extract Version from pyproject.toml
        id: get_version
        run: |
          # Navigates to the service folder, gets the version via PDM, and stores it as an output
          cd back/${{ matrix.service }}
          VERSION=$(pdm show --version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: antonind5/goat-calendar-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.get_version.outputs.version }}
            type=sha,format=long

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./back/production/${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: index.docker.io/antonind5/goat-calendar-${{ matrix.service }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

